# ##################################################################################################
# File: tasks/git_gh.Taskfile.yml
# Purpose:
#   GitHub authentication, Git identity setup, and repository credential configuration.
#
# Notes:
#   - Git and GitHub CLI installation belong to tasks/apps.Taskfile.yml.
#   - Git itself does not “authenticate” as an app; access auth is handled via credential helpers.
#     This Taskfile uses `gh auth setup-git` so Git operations against GitHub work seamlessly.
#   - Fine-grained PAT guidance:
#       * Token must be created for the correct owner (user/org) and repositories.
#       * Ensure it has sufficient permissions for your workflows (for example, repo contents read/write).
#   - Non-interactive usage:
#       * Export GITHUB_TOKEN (recommended) or GH_TOKEN prior to running `task git_gh:bootstrap` or `task git_gh:auth`.
#   - Security:
#       * Token is never echoed. When prompted, input is hidden.
#       * Avoid pasting tokens into command history; prefer environment variables or the prompt.
# ##################################################################################################

version: "3"

silent: true

vars:
  GH_HOST: "github.com"
  ENV_FILE: 'state/configs/.env'
  BOOTSTRAP_SECRETS_FILE: 'state/secrets/bootstrap/bootstrap.secrets.env'

tasks:
  git_gh:bootstrap:
    desc: Bootstrap GitHub CLI authentication, Git identity, and repository credentials
    cmds:
      - task: git_gh:preflight
      - task: git_gh:auth

  git_gh:preflight:
    desc: Validate that the required Git and GitHub tooling is available
    cmds:
      - |
        set -euo pipefail

        if ! command -v git >/dev/null 2>&1; then
          echo 'git not installed. Run: task apps:install:git' >&2
          exit 1
        fi

        if ! command -v gh >/dev/null 2>&1; then
          echo 'gh not installed. Run: task apps:install:gh' >&2
          exit 1
        fi

        echo 'Git and GitHub CLI are available.'

  git_gh:auth:
    desc: Authenticate gh using a Fine-grained PAT, then configure Git for GitHub access
    cmds:
      - task: git_gh:auth:gh
      - task: git_gh:auth:git
      - task: git_gh:status

  git_gh:auth:gh:
    desc: Authenticate gh against GitHub using a Fine-grained personal access token
    status:
      - gh auth status -h {{.GH_HOST}} >/dev/null 2>&1
    cmds:
      - |
        set -euo pipefail

        if ! command -v gh >/dev/null 2>&1; then
          echo "gh not installed. Run: task apps:install:gh"
          exit 1
        fi

        echo "gh is not authenticated for {{.GH_HOST}}."
        echo "Authenticating with a Fine-grained personal access token..."

        secrets_file='{{.BOOTSTRAP_SECRETS_FILE}}'
        TOKEN="${GITHUB_TOKEN:-${GH_TOKEN:-}}"
        if [ -z "${TOKEN}" ] && [ -f "${secrets_file}" ]; then
          TOKEN="$(grep -E '^GITHUB_TOKEN=' "${secrets_file}" | tail -n 1 | cut -d'=' -f2- || true)"
        fi

        if [ -z "${TOKEN}" ]; then
          echo "Missing GITHUB_TOKEN in environment or ${secrets_file}."
          echo 'Run: task inputs:gather'
          exit 1
        fi

        printf "%s" "${TOKEN}" | gh auth login -h {{.GH_HOST}} --with-token

        unset TOKEN
        echo "gh authentication complete."

  git_gh:auth:git:
    desc: Configure Git identity and set up GitHub HTTPS credentials via gh or a credential helper
    cmds:
      - |
        set -euo pipefail

        if ! command -v git >/dev/null 2>&1; then
          echo "git not installed. Run: task apps:install:git"
          exit 1
        fi

        env_file='{{.ENV_FILE}}'
        secrets_file='{{.BOOTSTRAP_SECRETS_FILE}}'

        if [ ! -f "${env_file}" ]; then
          echo "Required env file not found: ${env_file}"
          echo 'Run: task inputs:gather'
          exit 1
        fi

        # shellcheck disable=SC1090
        . "${env_file}"

        if [ -n "${GIT_USER_NAME:-}" ]; then
          git config --global user.name "${GIT_USER_NAME}"
        else
          echo "Missing GIT_USER_NAME in ${env_file}."
          echo 'Run: task inputs:gather'
          exit 1
        fi

        if [ -n "${GIT_USER_EMAIL:-}" ]; then
          git config --global user.email "${GIT_USER_EMAIL}"
        else
          echo "Missing GIT_USER_EMAIL in ${env_file}."
          echo 'Run: task inputs:gather'
          exit 1
        fi

        if command -v gh >/dev/null 2>&1 && gh auth status -h {{.GH_HOST}} >/dev/null 2>&1; then
          echo "Configuring git to use gh credentials for {{.GH_HOST}}..."
          gh auth setup-git -h {{.GH_HOST}}
          echo "git auth setup complete via gh."
          exit 0
        fi

        echo "gh is not available or not authenticated. Falling back to Git credential storage for {{.GH_HOST}}."
        echo "Note: For GitHub, use a Fine-grained PAT as the password rather than your GitHub account password."

        GH_USER="${GITHUB_USERNAME:-}"
        if [ -z "${GH_USER}" ]; then
          echo "Missing GITHUB_USERNAME in ${env_file}."
          echo 'Run: task inputs:gather'
          exit 1
        fi

        GH_PASS="${GITHUB_TOKEN:-${GH_TOKEN:-}}"
        if [ -z "${GH_PASS}" ] && [ -f "${secrets_file}" ]; then
          GH_PASS="$(grep -E '^GITHUB_TOKEN=' "${secrets_file}" | tail -n 1 | cut -d'=' -f2- || true)"
        fi

        if [ -z "${GH_PASS}" ]; then
          echo "Missing GITHUB_TOKEN in environment or ${secrets_file}."
          echo 'Run: task inputs:gather'
          exit 1
        fi

        printf "protocol=https
        host={{.GH_HOST}}
        username=%s
        password=%s

        " "${GH_USER}" "${GH_PASS}"           | git credential approve

        unset GH_PASS
        echo "GitHub credentials stored for HTTPS access to {{.GH_HOST}}."

  git_gh:status:
    desc: Show current git and gh status for quick diagnostics
    cmds:
      - |
        set -euo pipefail
        echo "git:  $(command -v git >/dev/null 2>&1 && git --version || echo 'not installed')"
        echo "gh:   $(command -v gh  >/dev/null 2>&1 && gh --version | head -n 1 || echo 'not installed')"
        if command -v gh >/dev/null 2>&1; then
          gh auth status -h {{.GH_HOST}} || true
        fi
