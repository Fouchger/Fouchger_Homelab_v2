# ================================================================
# File: tasks/packer.Taskfile.yml
# Purpose:
#   Curated Packer task workflow for Proxmox template lifecycle delivery.
#
# Notes:
#   - Mirrors the existing task-driven operator model used elsewhere in
#     the repository.
#   - Local-only values are rendered from state/configs and state/secrets.
#   - ISO assets are downloaded directly on the Proxmox host to avoid the
#     flaky Proxmox API upload path.
# ================================================================

version: '3'

silent: true

vars:
  ROOT_DIR: '{{.ROOT_DIR | default .USER_WORKING_DIR}}'
  PACKER_DIR: '{{.ROOT_DIR}}/packer/proxmox'
  PACKER_SCRIPTS_DIR: '{{.ROOT_DIR}}/packer/scripts'
  STATE_DIR: '{{.ROOT_DIR}}/state'
  CONFIGS_DIR: '{{.STATE_DIR}}/configs'
  ENV_FILE: '{{.CONFIGS_DIR}}/.env'
  TOKEN_ENV_FILE: '{{.STATE_DIR}}/secrets/proxmox/proxmox-api-token.env'
  PACKER_SECRET_ENV_FILE: '{{.STATE_DIR}}/secrets/packer/packer-build.env'
  SSH_DIR: '{{.SSH_DIR | default (printf "%s/.ssh" .HOME)}}'
  SSH_FILE: '{{.SSH_FILE | default "id_ed25519"}}'
  SSH_KEY_PATH: '{{.SSH_KEY_PATH | default (printf "%s/%s" .SSH_DIR .SSH_FILE)}}'
  SSH_KNOWN_HOSTS: '{{.SSH_KNOWN_HOSTS | default (printf "%s/known_hosts" .SSH_DIR)}}'


tasks:
  packer:dirs:
    desc: Ensure the local Packer state directories exist
    cmds:
      - mkdir -p '{{.ROOT_DIR}}/packer/generated' '{{.STATE_DIR}}/secrets/packer'

  packer:vars:render:
    desc: Render local.auto.pkrvars.hcl from state/configs and state/secrets
    cmds:
      - task: packer:dirs
      - python3 '{{.PACKER_SCRIPTS_DIR}}/render_local_vars.py'
      - python3 '{{.PACKER_SCRIPTS_DIR}}/render_template_vars.py'

  packer:catalog:refresh:
    desc: Render an operator review scaffold for curated image metadata refreshes
    cmds:
      - python3 '{{.PACKER_SCRIPTS_DIR}}/refresh_catalog.py'

  packer:stage:
    desc: Stage a runnable flat Packer catalogue from the per-OS source layout
    vars:
      STAGING_DIR: '{{.ROOT_DIR}}/packer/generated/staging/proxmox'
    cmds:
      - task: packer:dirs
      - |
          # ############################################################
          # Task: packer:stage
          # Description:
          #   Flatten the per-OS Packer source layout into a temporary
          #   runnable catalogue because Packer loads HCL files from a
          #   single working directory only.
          # Notes:
          #   - OS assets remain grouped in the repository under ubuntu,
          #     debian, talos, and common.
          #   - Runtime HCL is copied into the staging root so packer init,
          #     validate, and build can resolve sources and builds together.
          # ############################################################
          set -euo pipefail

          staging_dir='{{.STAGING_DIR}}'
          source_dir='{{.PACKER_DIR}}'

          rm -rf "${staging_dir}"
          mkdir -p "${staging_dir}"

          cp "${source_dir}/variables.pkr.hcl" "${staging_dir}/"
          cp "${source_dir}/locals.pkr.hcl" "${staging_dir}/"
          cp "${source_dir}/plugins.pkr.hcl" "${staging_dir}/"

          if [ -f "${source_dir}/local.auto.pkrvars.hcl" ]; then
            cp "${source_dir}/local.auto.pkrvars.hcl" "${staging_dir}/"
          fi

          cp -R "${source_dir}/common" "${staging_dir}/"
          cp -R "${source_dir}/ubuntu" "${staging_dir}/"
          cp -R "${source_dir}/debian" "${staging_dir}/"

          cp "${source_dir}/ubuntu/builds.pkr.hcl" "${staging_dir}/ubuntu-builds.pkr.hcl"
          cp "${source_dir}/ubuntu/ubuntu-22.pkr.hcl" "${staging_dir}/ubuntu-22.pkr.hcl"
          cp "${source_dir}/ubuntu/ubuntu-24.pkr.hcl" "${staging_dir}/ubuntu-24.pkr.hcl"
          cp "${source_dir}/debian/builds.pkr.hcl" "${staging_dir}/debian-builds.pkr.hcl"
          cp "${source_dir}/debian/debian-12.pkr.hcl" "${staging_dir}/debian-12.pkr.hcl"
          cp "${source_dir}/debian/debian-13.pkr.hcl" "${staging_dir}/debian-13.pkr.hcl"

          echo "Staged runnable Packer catalogue at ${staging_dir}"
          echo "Talos templates use the dedicated Image Factory build path via packer/scripts/build_talos_template.py"

  packer:init:
    desc: Initialise Packer plugins for the curated Proxmox template catalogue
    vars:
      STAGING_DIR: '{{.ROOT_DIR}}/packer/generated/staging/proxmox'
    cmds:
      - task: apps:packer
      - task: packer:vars:render
      - task: packer:stage
      - packer init '{{.STAGING_DIR}}'

  packer:fmt:
    desc: Format the curated Packer HCL files
    cmds:
      - task: apps:packer
      - packer fmt -recursive '{{.PACKER_DIR}}'

  packer:validate:
    desc: Validate the curated Packer Proxmox template catalogue
    vars:
      STAGING_DIR: '{{.ROOT_DIR}}/packer/generated/staging/proxmox'
    cmds:
      - task: packer:init
      - packer validate '{{.STAGING_DIR}}'

  packer:isos:sync:all:
    desc: Ensure all curated ISO assets are present on the Proxmox ISO datastore
    cmds:
      - task: packer:vars:render
      - |
          # ############################################################
          # Task: packer:isos:sync
          # Description:
          #   Download missing ISO assets directly on the Proxmox host.
          # ############################################################
          set -euo pipefail

          env_file='{{.ENV_FILE}}'
          token_file='{{.TOKEN_ENV_FILE}}'
          ssh_key='{{.SSH_KEY_PATH}}'
          known_hosts='{{.SSH_KNOWN_HOSTS}}'

          if [ ! -f "${env_file}" ]; then
            echo "Required env file not found: ${env_file}"
            exit 1
          fi

          # shellcheck disable=SC1090
          . "${env_file}"

          python3 - <<'PY' > /tmp/packer_iso_catalog.tsv
          from pathlib import Path
          import re

          variables_file = Path('{{.PACKER_DIR}}') / 'variables.pkr.hcl'
          text = variables_file.read_text(encoding='utf-8')
          patterns = {
              'ubuntu_22': ('ubuntu_22_iso_filename', 'ubuntu_22_iso_url'),
              'ubuntu_24': ('ubuntu_24_iso_filename', 'ubuntu_24_iso_url'),
              'debian_12': ('debian_12_iso_filename', 'debian_12_iso_url'),
              'debian_13': ('debian_13_iso_filename', 'debian_13_iso_url'),
          }

          def extract(var_name: str) -> str:
              open_brace = chr(123)
              pattern = r'variable "{}" \{}.*?default\s*=\s*"([^"]+)"'.format(
                  re.escape(var_name),
                  open_brace,
              )
              match = re.search(
                  pattern,
                  text,
                  re.S,
              )
              if not match:
                  raise SystemExit(f'Missing default for {var_name}')
              return match.group(1)

          for key, (filename_key, url_key) in patterns.items():
              print(f"{key}\t{extract(filename_key)}\t{extract(url_key)}")
          PY

          while IFS=$'\t' read -r image_key image_filename image_url; do
            [ -n "${image_key}" ] || continue
            echo "Ensuring ${image_filename} is present on ${PROXMOX_HOST_IP}..."

            ssh \
              -i "${ssh_key}" \
              -o BatchMode=yes \
              -o StrictHostKeyChecking=accept-new \
              -o UserKnownHostsFile="${known_hosts}" \
              "${PROXMOX_SSH_USER}@${PROXMOX_HOST_IP}" \
              "bash -lc 'set -euo pipefail; mkdir -p /var/lib/vz/template/iso; if [ ! -f /var/lib/vz/template/iso/${image_filename} ]; then wget -O /var/lib/vz/template/iso/${image_filename}.part ${image_url} && mv /var/lib/vz/template/iso/${image_filename}.part /var/lib/vz/template/iso/${image_filename}; else echo already-present; fi'"
          done < /tmp/packer_iso_catalog.tsv

          rm -f /tmp/packer_iso_catalog.tsv

  packer:isos:sync:
    desc: Ensure curated ISO assets are present on the Proxmox ISO datastore
    vars:
      IMAGE: '{{.IMAGE | default ""}}'
    cmds:
      - task: packer:vars:render
      - |
          # ############################################################
          # Task: packer:isos:sync
          # Description:
          #   Download missing ISO assets directly on the Proxmox host.
          #   Optionally filter to a single image with IMAGE=<name>.
          # task packer:isos:sync IMAGE=ubuntu_22
          # task packer:isos:sync IMAGE=ubuntu_24
          # task packer:isos:sync IMAGE=debian_12
          # task packer:isos:sync IMAGE=debian_13
          # ############################################################
          set -euo pipefail

          env_file='{{.ENV_FILE}}'
          ssh_key='{{.SSH_KEY_PATH}}'
          known_hosts='{{.SSH_KNOWN_HOSTS}}'
          image_filter='{{.IMAGE}}'

          if [ ! -f "${env_file}" ]; then
            echo "Required env file not found: ${env_file}"
            exit 1
          fi

          # shellcheck disable=SC1090
          . "${env_file}"

          python3 - <<'PY' > /tmp/packer_iso_catalog.tsv
          from pathlib import Path
          import re

          variables_file = Path('{{.PACKER_DIR}}') / 'variables.pkr.hcl'
          text = variables_file.read_text(encoding='utf-8')

          patterns = {
              'ubuntu_22': ('ubuntu_22_iso_filename', 'ubuntu_22_iso_url'),
              'ubuntu_24': ('ubuntu_24_iso_filename', 'ubuntu_24_iso_url'),
              'debian_12': ('debian_12_iso_filename', 'debian_12_iso_url'),
              'debian_13': ('debian_13_iso_filename', 'debian_13_iso_url'),
          }

          def extract(var_name: str) -> str:
              open_brace = chr(123)
              pattern = r'variable "{}" \{}.*?default\s*=\s*"([^"]+)"'.format(
                  re.escape(var_name),
                  open_brace,
              )
              match = re.search(pattern, text, re.S)
              if not match:
                  raise SystemExit(f'Missing default for {var_name}')
              return match.group(1)

          for key, (filename_key, url_key) in patterns.items():
              print(f"{key}\t{extract(filename_key)}\t{extract(url_key)}")
          PY

          while IFS=$'\t' read -r image_key image_filename image_url; do
            [ -n "${image_key}" ] || continue

            if [ -n "${image_filter}" ] && [ "${image_key}" != "${image_filter}" ]; then
              continue
            fi

            echo "Ensuring ${image_filename} is present on ${PROXMOX_HOST_IP}..."

            ssh \
              -i "${ssh_key}" \
              -o BatchMode=yes \
              -o StrictHostKeyChecking=accept-new \
              -o UserKnownHostsFile="${known_hosts}" \
              "${PROXMOX_SSH_USER}@${PROXMOX_HOST_IP}" \
              "bash -lc 'set -euo pipefail; mkdir -p /var/lib/vz/template/iso; if [ ! -f /var/lib/vz/template/iso/${image_filename} ]; then wget -O /var/lib/vz/template/iso/${image_filename}.part ${image_url} && mv /var/lib/vz/template/iso/${image_filename}.part /var/lib/vz/template/iso/${image_filename}; else echo already-present; fi'"
          done < /tmp/packer_iso_catalog.tsv

          rm -f /tmp/packer_iso_catalog.tsv

          if [ -n "${image_filter}" ]; then
            echo "Completed ISO sync for ${image_filter}."
          else
            echo "Completed ISO sync for all curated images."
          fi

  packer:isos:destroy:
    desc: Remove a curated ISO asset from the Proxmox ISO datastore
    vars:
      IMAGE: '{{.IMAGE | default ""}}'
    preconditions:
      - sh: '[ -n "{{.IMAGE}}" ]'
        msg: 'IMAGE is required. Example: task packer:isos:destroy IMAGE=ubuntu_22'
    cmds:
      - task: packer:vars:render
      - |
          # ############################################################
          # Task: packer:isos:destroy
          # Description:
          #   Remove a curated ISO asset from the Proxmox ISO datastore.
          #
          # Examples:
          #   task packer:isos:destroy IMAGE=ubuntu_22
          #   task packer:isos:destroy IMAGE=ubuntu_24
          #   task packer:isos:destroy IMAGE=debian_12
          #   task packer:isos:destroy IMAGE=debian_13
          # ############################################################
          set -euo pipefail

          env_file='{{.ENV_FILE}}'
          ssh_key='{{.SSH_KEY_PATH}}'
          known_hosts='{{.SSH_KNOWN_HOSTS}}'
          image_filter='{{.IMAGE}}'

          if [ ! -f "${env_file}" ]; then
            echo "Required env file not found: ${env_file}"
            exit 1
          fi

          # shellcheck disable=SC1090
          . "${env_file}"

          python3 - <<'PY' > /tmp/packer_iso_destroy.tsv
          from pathlib import Path
          import re

          variables_file = Path('{{.PACKER_DIR}}') / 'variables.pkr.hcl'
          text = variables_file.read_text(encoding='utf-8')
          image_filter = "{{.IMAGE}}"

          patterns = {
              'ubuntu_22': 'ubuntu_22_iso_filename',
              'ubuntu_24': 'ubuntu_24_iso_filename',
              'debian_12': 'debian_12_iso_filename',
              'debian_13': 'debian_13_iso_filename',
          }

          if image_filter not in patterns:
              valid = ", ".join(sorted(patterns))
              raise SystemExit(f"Unsupported IMAGE '{image_filter}'. Valid values: {valid}")

          def extract(var_name: str) -> str:
              open_brace = chr(123)
              pattern = r'variable "{}" \{}.*?default\s*=\s*"([^"]+)"'.format(
                  re.escape(var_name),
                  open_brace,
              )
              match = re.search(pattern, text, re.S)
              if not match:
                  raise SystemExit(f"Missing default for {var_name}")
              return match.group(1)

          print(f"{image_filter}\t{extract(patterns[image_filter])}")
          PY

          while IFS=$'\t' read -r image_key image_filename; do
            [ -n "${image_key}" ] || continue

            echo "Removing ${image_filename} from ${PROXMOX_HOST_IP}..."

            ssh \
              -i "${ssh_key}" \
              -o BatchMode=yes \
              -o StrictHostKeyChecking=accept-new \
              -o UserKnownHostsFile="${known_hosts}" \
              "${PROXMOX_SSH_USER}@${PROXMOX_HOST_IP}" \
              "bash -lc 'set -euo pipefail; iso_file=/var/lib/vz/template/iso/${image_filename}; part_file=/var/lib/vz/template/iso/${image_filename}.part; if [ -f \"\${iso_file}\" ]; then rm -f \"\${iso_file}\"; echo removed; else echo not-present; fi; rm -f \"\${part_file}\"'"
          done < /tmp/packer_iso_destroy.tsv

          rm -f /tmp/packer_iso_destroy.tsv

          echo "Completed ISO removal for ${image_filter}."

  packer:build:if-missing:
    desc: Build a curated template only when the target template VMID does not already exist
    vars:
      IMAGE: '{{.IMAGE | default ""}}'
      ONLY_PATTERN: '{{.ONLY_PATTERN | default ""}}'
      TEMPLATE_VMID: '{{.TEMPLATE_VMID | default ""}}'
    preconditions:
      - sh: '[ -n "{{.IMAGE}}" ]'
        msg: 'IMAGE is required.'
      - sh: '[ -n "{{.ONLY_PATTERN}}" ]'
        msg: 'ONLY_PATTERN is required.'
      - sh: '[ -n "{{.TEMPLATE_VMID}}" ]'
        msg: 'TEMPLATE_VMID is required.'
    cmds:
      - |
          # ############################################################
          # Task: packer:build:if-missing
          # Description:
          #   Build the requested template only when the target VMID does
          #   not already exist as a Proxmox template.
          # Notes:
          #   - Skips the build when qm config confirms template: 1.
          #   - Preserves the existing task-driven workflow and cleanup path.
          # ############################################################
          set -euo pipefail

          env_file='{{.ENV_FILE}}'
          ssh_key='{{.SSH_KEY_PATH}}'
          known_hosts='{{.SSH_KNOWN_HOSTS}}'
          image_key='{{.IMAGE}}'
          only_pattern='{{.ONLY_PATTERN}}'
          template_vmid='{{.TEMPLATE_VMID}}'

          if [ ! -f "${env_file}" ]; then
            echo "Required env file not found: ${env_file}"
            exit 1
          fi

          # shellcheck disable=SC1090
          . "${env_file}"

          if [ -z "${PROXMOX_HOST_IP:-}" ] || [ -z "${PROXMOX_SSH_USER:-}" ]; then
            echo "Missing PROXMOX_HOST_IP or PROXMOX_SSH_USER in ${env_file}"
            exit 1
          fi

          echo "Checking whether template VMID ${template_vmid} already exists on ${PROXMOX_HOST_IP}..."

          if ssh \
            -i "${ssh_key}" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=accept-new \
            -o UserKnownHostsFile="${known_hosts}" \
            "${PROXMOX_SSH_USER}@${PROXMOX_HOST_IP}" \
            "bash -lc 'qm config ${template_vmid} 2>/dev/null | grep -q \"^template: 1$\"'"
          then
            echo "Template VMID ${template_vmid} already exists. Skipping build for ${image_key}."
            exit 0
          fi

          echo "Template VMID ${template_vmid} does not exist. Building ${image_key}..."

          task packer:validate
          task packer:isos:sync IMAGE="${image_key}"
          packer build -only="${only_pattern}" '{{.ROOT_DIR}}/packer/generated/staging/proxmox'
          task packer:isos:destroy IMAGE="${image_key}"

  packer:build:ubuntu22:
    desc: Build the Ubuntu 22 template only when it does not already exist
    cmds:
      - task: packer:build:if-missing
        vars:
          IMAGE: ubuntu_22
          ONLY_PATTERN: ubuntu-22.*
          TEMPLATE_VMID: 24001

  packer:build:ubuntu24:
    desc: Build the Ubuntu 24 template only when it does not already exist
    cmds:
      - task: packer:build:if-missing
        vars:
          IMAGE: ubuntu_24
          ONLY_PATTERN: ubuntu-24.*
          TEMPLATE_VMID: 24002

  packer:build:debian12:
    desc: Build the Debian 12 template only when it does not already exist
    cmds:
      - task: packer:build:if-missing
        vars:
          IMAGE: debian_12
          ONLY_PATTERN: debian-12.*
          TEMPLATE_VMID: 24021

  packer:build:debian13:
    desc: Build the Debian 13 template only when it does not already exist
    cmds:
      - task: packer:build:if-missing
        vars:
          IMAGE: debian_13
          ONLY_PATTERN: debian-13.*
          TEMPLATE_VMID: 24022

  packer:build:talos1124:
    desc: Build the Talos 1.12.4 Proxmox template from Image Factory when it does not already exist
    cmds:
      - task: packer:vars:render
      - python3 '{{.PACKER_SCRIPTS_DIR}}/build_talos_template.py' --version v1.12.4 --vmid 24041 --template-name tpl-talos-1-12-4

  packer:build:talos1125:
    desc: Build the Talos 1.12.5 Proxmox template from Image Factory when it does not already exist
    cmds:
      - task: packer:vars:render
      - python3 '{{.PACKER_SCRIPTS_DIR}}/build_talos_template.py' --version v1.12.5 --vmid 24042 --template-name tpl-talos-1-12-5


  packer:build:ubuntu-22:
    desc: Compatibility alias for packer:build:ubuntu22
    cmds:
      - task: packer:build:ubuntu22

  packer:build:ubuntu-24:
    desc: Compatibility alias for packer:build:ubuntu24
    cmds:
      - task: packer:build:ubuntu24

  packer:build:debian-12:
    desc: Compatibility alias for packer:build:debian12
    cmds:
      - task: packer:build:debian12

  packer:build:debian-13:
    desc: Compatibility alias for packer:build:debian13
    cmds:
      - task: packer:build:debian13

  packer:build:talos-1.12.4:
    desc: Compatibility alias for packer:build:talos1124
    cmds:
      - task: packer:build:talos1124

  packer:build:talos-1.12.5:
    desc: Compatibility alias for packer:build:talos1125
    cmds:
      - task: packer:build:talos1125

  packer:destroy:template:
    internal: true
    desc: Internal helper to destroy a single repository-managed Proxmox template VM
    requires:
      vars:
        - TEMPLATE_VMID
        - TEMPLATE_NAME
    cmds:
      - |
          # ================================================================
          # Task: packer:destroy:template
          # Purpose:
          #   Stop and destroy a repository-managed Proxmox template VM when
          #   it exists.
          # ================================================================
          set -euo pipefail

          env_file='{{.ENV_FILE}}'
          ssh_key='{{.SSH_KEY_PATH}}'
          known_hosts='{{.SSH_KNOWN_HOSTS}}'

          if [ ! -f "${env_file}" ]; then
            echo "Required env file not found: ${env_file}" >&2
            echo 'Run: task day1:proxmox'
            exit 1
          fi

          # shellcheck disable=SC1090
          . "${env_file}"

          : "${PROXMOX_HOST_IP:?PROXMOX_HOST_IP must be set in ${env_file}}"
          : "${PROXMOX_SSH_USER:?PROXMOX_SSH_USER must be set in ${env_file}}"

          ssh_target="${PROXMOX_SSH_USER}@${PROXMOX_HOST_IP}"

          if ! ssh -i "${ssh_key}" -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile="${known_hosts}"             "${ssh_target}" "bash -lc 'qm config {{.TEMPLATE_VMID}} >/dev/null 2>&1'"; then
            echo 'Template {{.TEMPLATE_NAME}} with VMID {{.TEMPLATE_VMID}} is not present. Skipping destroy step.'
            exit 0
          fi

          echo 'Destroying template {{.TEMPLATE_NAME}} with VMID {{.TEMPLATE_VMID}} on Proxmox...'

          ssh -i "${ssh_key}" -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile="${known_hosts}"             "${ssh_target}"             "bash -lc 'set -euo pipefail; if qm status {{.TEMPLATE_VMID}} 2>/dev/null | grep -q running; then qm stop {{.TEMPLATE_VMID}} --timeout 60 || true; fi; qm destroy {{.TEMPLATE_VMID}} --purge 1 --destroy-unreferenced-disks 1'"

          echo 'Destroyed template {{.TEMPLATE_NAME}}.'

  packer:destroy:ubuntu22:
    desc: Destroy the Ubuntu 22 template when it exists
    cmds:
      - task: packer:destroy:template
        vars:
          TEMPLATE_VMID: 24001
          TEMPLATE_NAME: ubuntu22

  packer:destroy:ubuntu24:
    desc: Destroy the Ubuntu 24 template when it exists
    cmds:
      - task: packer:destroy:template
        vars:
          TEMPLATE_VMID: 24002
          TEMPLATE_NAME: ubuntu24

  packer:destroy:debian12:
    desc: Destroy the Debian 12 template when it exists
    cmds:
      - task: packer:destroy:template
        vars:
          TEMPLATE_VMID: 24021
          TEMPLATE_NAME: debian12

  packer:destroy:debian13:
    desc: Destroy the Debian 13 template when it exists
    cmds:
      - task: packer:destroy:template
        vars:
          TEMPLATE_VMID: 24022
          TEMPLATE_NAME: debian13

  packer:destroy:talos1124:
    desc: Destroy the Talos 1.12.4 template when it exists
    cmds:
      - task: packer:destroy:template
        vars:
          TEMPLATE_VMID: 24041
          TEMPLATE_NAME: talos1124

  packer:destroy:talos1125:
    desc: Destroy the Talos 1.12.5 template when it exists
    cmds:
      - task: packer:destroy:template
        vars:
          TEMPLATE_VMID: 24042
          TEMPLATE_NAME: talos1125

  packer:destroy:ubuntu-22:
    desc: Compatibility alias for packer:destroy:ubuntu22
    cmds:
      - task: packer:destroy:ubuntu22

  packer:destroy:ubuntu-24:
    desc: Compatibility alias for packer:destroy:ubuntu24
    cmds:
      - task: packer:destroy:ubuntu24

  packer:destroy:debian-12:
    desc: Compatibility alias for packer:destroy:debian12
    cmds:
      - task: packer:destroy:debian12

  packer:destroy:debian-13:
    desc: Compatibility alias for packer:destroy:debian13
    cmds:
      - task: packer:destroy:debian13

  packer:destroy:talos-1.12.4:
    desc: Compatibility alias for packer:destroy:talos1124
    cmds:
      - task: packer:destroy:talos1124

  packer:destroy:talos-1.12.5:
    desc: Compatibility alias for packer:destroy:talos1125
    cmds:
      - task: packer:destroy:talos1125

  packer:destroy:all:
    desc: Destroy all repository-managed Proxmox templates
    cmds:
      - task: packer:destroy:talos1125
      - task: packer:destroy:talos1124
      - task: packer:destroy:debian13
      - task: packer:destroy:debian12
      - task: packer:destroy:ubuntu24
      - task: packer:destroy:ubuntu22

  packer:isos:destroy:all:
    desc: Remove all curated ISO assets from the Proxmox ISO datastore
    cmds:
