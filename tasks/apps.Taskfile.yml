# ###########################################################################
# File: tasks/apps.Taskfile.yml
# Purpose:
#   Application installation Taskfile for Fouchger homelab systems.
#
# Scope:
#   - System package upgrade with apt lock handling
#   - Core host application installation
#   - code-server installation for browser-based administration
#
# Notes:
#   - Designed for Debian/Ubuntu class systems where apt-get is available.
#   - Tasks are sequenced deliberately where apt operations are involved to
#     avoid lock contention from parallel dependency execution.
#   - Git and GitHub authentication belong to tasks/git_gh.Taskfile.yml.
#   - Secrets tooling and secrets bootstrap belong to tasks/secrets.Taskfile.yml.
#   - This Taskfile keeps install tasks unchanged while removing duplicate task
#     definitions and cross-domain bootstrap steps.
# ###########################################################################

version: '3'

silent: true

vars:
  APT_GET: 'apt-get'
  SUDO: '{{.SUDO | default "sudo"}}'
  DEBIAN_FRONTEND: 'noninteractive'
  APT_LOCK_TIMEOUT: '{{.APT_LOCK_TIMEOUT | default "600"}}'
  APT_LOCK_SLEEP: '{{.APT_LOCK_SLEEP | default "3"}}'
  HASHICORP_KEYRING: '/etc/apt/keyrings/hashicorp-archive-keyring.gpg'
  HASHICORP_LIST: '/etc/apt/sources.list.d/hashicorp.list'
  USE_PROXMOX_SCRIPT: '{{.USE_PROXMOX_SCRIPT | default "1"}}'
  USER_LOCAL_BIN:
    sh: |
      if [ -n "${HOME:-}" ]; then
        printf '%s' "${HOME}/.local/bin"
      else
        printf '%s' "$HOME/.local/bin"
      fi

env:
  DEBIAN_FRONTEND: '{{.DEBIAN_FRONTEND}}'
  PATH: '{{.USER_LOCAL_BIN}}:{{.PATH}}'

tasks:
  apps:bootstrap:
    desc: Install the core homelab applications and host prerequisites
    cmds:
      - task: apps:upgrade
      - task: apps:code-server
      - task: apps:install:ca-certificates
      - task: apps:install:curl
      - task: apps:install:gnupg
      - task: apps:install:git
      - task: apps:install:gh
      - task: apps:install:jq
      - task: apps:install:openssl
      - task: apps:install:sed
      - task: apps:install:gawk
      - task: apps:install:lsb-release
      - task: apps:python3
      - task: apps:pipx
      - task: apps:ansible
      - task: apps:ansible:collections
      - task: apps:hashicorp-repo
      - task: apps:terraform
      - task: apps:packer

  apps:upgrade:
    desc: Upgrade the system package set and clean residual packages
    cmds:
      - task: apps:apt:update
      - task: apps:apt:run
        vars:
          ARGS: 'full-upgrade -y'
      - task: apps:apt:run
        vars:
          ARGS: 'autoremove -y'
      - task: apps:apt:run
        vars:
          ARGS: 'autoclean -y'

  apps:code-server:
    desc: Install code-server using the Proxmox helper script or the official installer
    status:
      - command -v code-server >/dev/null 2>&1
    cmds:
      - |
        set -euo pipefail

        if [ '{{.USE_PROXMOX_SCRIPT}}' = '1' ]; then
          echo 'Installing code-server using the community Proxmox helper script'
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/community-scripts/ProxmoxVE/main/tools/addon/coder-code-server.sh)"
        else
          echo 'Installing code-server using the official installer'
          curl -fsSL https://code-server.dev/install.sh | sh
        fi

  apps:install:gh:
    desc: Install GitHub CLI (gh) if not installed (via official GitHub apt repo)
    status:
      - command -v gh >/dev/null 2>&1
    cmds:
      - |
        set -euo pipefail

        sudo install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg           | sudo gpg --dearmor -o /etc/apt/keyrings/githubcli-archive-keyring.gpg
        sudo chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg

        ARCH="$(dpkg --print-architecture)"
        echo "deb [arch=${ARCH} signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main"           | sudo tee /etc/apt/sources.list.d/github-cli.list >/dev/null

        sudo {{.APT_GET}} update
        sudo {{.APT_GET}} install -y gh

  apps:apt:wait:
    desc: Wait until apt and dpkg locks are released
    cmds:
      - |
        set -euo pipefail

        timeout='{{.APT_LOCK_TIMEOUT}}'
        sleep_s='{{.APT_LOCK_SLEEP}}'
        start="$(date +%s)"

        locks=(
          /var/lib/apt/lists/lock
          /var/lib/dpkg/lock
          /var/lib/dpkg/lock-frontend
          /var/cache/apt/archives/lock
        )

        while true; do
          if {{.SUDO}} fuser "${locks[@]}" >/dev/null 2>&1; then
            now="$(date +%s)"
            if [ $((now - start)) -ge "${timeout}" ]; then
              echo "Timed out after ${timeout}s waiting for apt or dpkg locks."
              echo 'Active lock holders, if any:'
              {{.SUDO}} fuser -v "${locks[@]}" || true
              exit 1
            fi
            echo "apt or dpkg is busy. Waiting ${sleep_s}s..."
            sleep "${sleep_s}"
            continue
          fi
          break
        done

  apps:apt:run:
    desc: Run apt-get with lock handling by passing ARGS="..."
    vars:
      ARGS: '{{.ARGS | default ""}}'
    cmds:
      - task: apps:apt:wait
      - |
        set -euo pipefail
        if [ -z '{{.ARGS}}' ]; then
          echo 'Missing ARGS. Example: task apps:apt:run -- ARGS="update -y"'
          exit 1
        fi
        {{.SUDO}} {{.APT_GET}} {{.ARGS}}

  apps:apt:update:
    desc: Run apt-get update with lock handling
    cmds:
      - task: apps:apt:wait
      - '{{.SUDO}} {{.APT_GET}} update -y'

  apps:apt:install:
    desc: Run apt-get install with lock handling by passing PKGS="..."
    vars:
      PKGS: '{{.PKGS | default ""}}'
    cmds:
      - task: apps:apt:wait
      - |
        set -euo pipefail
        if [ -z '{{.PKGS}}' ]; then
          echo 'Missing PKGS. Example: task apps:apt:install -- PKGS="curl ca-certificates"'
          exit 1
        fi
        {{.SUDO}} {{.APT_GET}} install -y {{.PKGS}}

  apps:python3:
    desc: Install Python 3 runtime and packaging prerequisites for pipx
    cmds:
      - task: apps:apt:update
      - task: apps:apt:install
        vars:
          PKGS: 'python3 python3-venv python3-pip'
    status:
      - command -v python3 >/dev/null 2>&1

  apps:pipx:
    desc: Install pipx and ensure the current user path is updated
    cmds:
      - task: apps:python3
      - task: apps:apt:update
      - task: apps:apt:install
        vars:
          PKGS: 'pipx'
      - pipx ensurepath || true
      - python3 -m pipx ensurepath || true
    status:
      - command -v pipx >/dev/null 2>&1

  apps:ansible:
    desc: Install or upgrade Ansible in an isolated pipx environment
    cmds:
      - task: apps:pipx
      - |
        set -euo pipefail

        current_user="${SUDO_USER:-${USER:-$(id -un)}}"
        current_home="$(getent passwd "${current_user}" | cut -d: -f6)"
        if [ -z "${current_home}" ]; then
          current_home="${HOME}"
        fi

        user_local_bin="${current_home}/.local/bin"
        profile_file="${current_home}/.profile"
        path_line='export PATH="$HOME/.local/bin:$PATH"'

        export PATH="${user_local_bin}:${PATH}"

        if pipx list --short 2>/dev/null | grep -qx 'ansible'; then
          echo 'Ansible is already installed in pipx.'
          pipx upgrade ansible || true
        else
          pipx install --include-deps ansible
        fi

        if ! pipx list --include-injected 2>/dev/null | grep -q 'argcomplete'; then
          pipx inject --include-apps ansible argcomplete
        fi

        install -d -m 0755 "${user_local_bin}"
        touch "${profile_file}"

        if ! grep -Fqx "${path_line}" "${profile_file}"; then
          printf '%s' "${path_line}" >> "${profile_file}"
          echo "Added ~/.local/bin PATH export to ${profile_file} for ${current_user}."
        else
          echo "PATH export already present in ${profile_file} for ${current_user}."
        fi

        if command -v ansible >/dev/null 2>&1; then
          ansible --version | head -n 1
        elif [ -x "${user_local_bin}/ansible" ]; then
          "${user_local_bin}/ansible" --version | head -n 1
        else
          echo 'WARNING: Ansible is installed via pipx, but the ansible shim is not on PATH.'
          echo "Open a new shell or source ${profile_file} to pick up ~/.local/bin."
          exit 1
        fi
    status:
      - |
        set -euo pipefail
        current_user="${SUDO_USER:-${USER:-$(id -un)}}"
        current_home="$(getent passwd "${current_user}" | cut -d: -f6)"
        if [ -z "${current_home}" ]; then
          current_home="${HOME}"
        fi
        profile_file="${current_home}/.profile"
        path_line='export PATH="$HOME/.local/bin:$PATH"'
        pipx list --short 2>/dev/null | grep -qx 'ansible' && grep -Fqx "${path_line}" "${profile_file}"

  apps:ansible:collections:
    desc: Install or upgrade repository Ansible collections
    cmds:
      - task: apps:ansible
      - |
        # ================================================================
        # Task: apps:ansible:collections
        # Purpose:
        #   Install the external Ansible collections required by this
        #   repository from ansible/requirements.yml.
        # ================================================================
        set -euo pipefail

        ansible_galaxy_cmd=''

        if command -v ansible-galaxy >/dev/null 2>&1; then
          ansible_galaxy_cmd="$(command -v ansible-galaxy)"
        elif [ -x "${HOME}/.local/bin/ansible-galaxy" ]; then
          ansible_galaxy_cmd="${HOME}/.local/bin/ansible-galaxy"
        elif [ -x "${HOME}/.local/share/pipx/venvs/ansible/bin/ansible-galaxy" ]; then
          ansible_galaxy_cmd="${HOME}/.local/share/pipx/venvs/ansible/bin/ansible-galaxy"
        else
          echo 'ansible-galaxy was not found. Run task apps:ansible first.' >&2
          exit 1
        fi

        "${ansible_galaxy_cmd}" collection install -r ansible/requirements.yml --force

  apps:hashicorp-repo:
    desc: Configure the HashiCorp apt repository for Terraform and Packer
    cmds:
      - task: apps:apt:update
      - task: apps:apt:install
        vars:
          PKGS: 'ca-certificates curl gnupg lsb-release'
      - '{{.SUDO}} install -m 0755 -d /etc/apt/keyrings'
      - |
        set -euo pipefail
        if [ ! -f '{{.HASHICORP_KEYRING}}' ]; then
          curl -fsSL --proto '=https' --tlsv1.2 https://apt.releases.hashicorp.com/gpg \
            | {{.SUDO}} gpg --dearmor -o '{{.HASHICORP_KEYRING}}'
        fi
        {{.SUDO}} chmod a+r '{{.HASHICORP_KEYRING}}'
      - |
        set -euo pipefail
        codename="$({{.SUDO}} lsb_release -cs)"
        repo_line="deb [signed-by={{.HASHICORP_KEYRING}}] https://apt.releases.hashicorp.com ${codename} main"
        current_line=""
        if [ -f '{{.HASHICORP_LIST}}' ]; then
          current_line="$(cat '{{.HASHICORP_LIST}}' 2>/dev/null || true)"
        fi
        if [ "${current_line}" != "${repo_line}" ]; then
          printf '%s\n' "${repo_line}" | {{.SUDO}} tee '{{.HASHICORP_LIST}}' >/dev/null
        fi
      - task: apps:apt:update
    status:
      - test -f '{{.HASHICORP_LIST}}'

  apps:terraform:
    desc: Install Terraform from the HashiCorp apt repository
    cmds:
      - task: apps:hashicorp-repo
      - task: apps:apt:install
        vars:
          PKGS: 'terraform'
      - terraform version
    status:
      - command -v terraform >/dev/null 2>&1

  apps:packer:
    desc: Install Packer from the HashiCorp apt repository
    cmds:
      - task: apps:hashicorp-repo
      - task: apps:apt:install
        vars:
          PKGS: 'packer'
      - packer version
    status:
      - command -v packer >/dev/null 2>&1

  apps:apt:wait:
    desc: Wait until apt and dpkg locks are released
    cmds:
      - |
        set -euo pipefail

        timeout='{{.APT_LOCK_TIMEOUT}}'
        sleep_s='{{.APT_LOCK_SLEEP}}'
        start="$(date +%s)"

        locks=(
          /var/lib/apt/lists/lock
          /var/lib/dpkg/lock
          /var/lib/dpkg/lock-frontend
          /var/cache/apt/archives/lock
        )

        while true; do
          if {{.SUDO}} fuser "${locks[@]}" >/dev/null 2>&1; then
            now="$(date +%s)"
            if [ $((now - start)) -ge "${timeout}" ]; then
              echo "Timed out after ${timeout}s waiting for apt or dpkg locks."
              echo 'Active lock holders, if any:'
              {{.SUDO}} fuser -v "${locks[@]}" || true
              exit 1
            fi
            echo "apt or dpkg is busy. Waiting ${sleep_s}s..."
            sleep "${sleep_s}"
            continue
          fi
          break
        done

  apps:install:ca-certificates:
    desc: Install ca-certificates if not installed
    cmds:
      - task: apps:apt:install
        vars:
          PKGS: 'ca-certificates'
    status:
      - dpkg -s ca-certificates >/dev/null 2>&1

  apps:install:curl:
    desc: Install curl if not installed
    cmds:
      - task: apps:apt:install
        vars:
          PKGS: 'curl'
    status:
      - command -v curl >/dev/null 2>&1

  apps:install:gnupg:
    desc: Install gnupg if not installed
    cmds:
      - task: apps:apt:install
        vars:
          PKGS: 'gnupg'
    status:
      - command -v gnupg >/dev/null 2>&1

  apps:install:git:
    desc: Install git if not installed
    cmds:
      - task: apps:apt:install
        vars:
          PKGS: 'git'
    status:
      - command -v git >/dev/null 2>&1


  apps:install:jq:
    desc: Install jq if not installed
    cmds:
      - task: apps:apt:install
        vars:
          PKGS: 'jq'
    status:
      - command -v jq >/dev/null 2>&1

  apps:install:openssl:
    desc: Install openssl if not installed
    cmds:
      - task: apps:apt:install
        vars:
          PKGS: 'openssl'
    status:
      - command -v openssl >/dev/null 2>&1

  apps:install:sed:
    desc: Install sed if not installed
    cmds:
      - task: apps:apt:install
        vars:
          PKGS: 'sed'
    status:
      - command -v sed >/dev/null 2>&1

  apps:install:gawk:
    desc: Install gawk if not installed
    cmds:
      - task: apps:apt:install
        vars:
          PKGS: 'gawk'
    status:
      - command -v gawk >/dev/null 2>&1

  apps:install:lsb-release:
    desc: Install lsb-release if not installed
    cmds:
      - task: apps:apt:install
        vars:
          PKGS: 'lsb-release'
    status:
      - command -v lsb-release >/dev/null 2>&1


